name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to dixieroad.org
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Tailscale connect
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: /srv/lilly-75-holy
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" "
            set -euo pipefail
            cd $DEPLOY_PATH
            git fetch --all --prune
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
          "

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS https://dixieroad.org/api/healthz | grep -q '"ok":true'; then
              echo 'Healthz OK'
              exit 0
            fi
            echo "attempt $i: not yet, sleeping 6s"
            sleep 6
          done
          echo 'Healthz did not return OK'
          exit 1
