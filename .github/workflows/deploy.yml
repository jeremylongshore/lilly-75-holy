name: Deploy

# Production deploy to the Intent Solutions Contabo VPS at intentsolutions
# (167.86.106.29). Direct-SSH variant — uses the per-repo ed25519 deploy key
# to SSH into the VPS over the public IP. Tailscale OIDC was tried first
# (canonical pattern), but the trust on Tailscale rejected the token
# exchange (HTTP 400) — likely a stale credential in the runbook sops.
# When that's resolved, switch back to the canonical reusable workflow at
# jeremylongshore/.github/.github/workflows/vps-deploy.yml@<SHA>.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-vps-${{ github.repository }}
  cancel-in-progress: false

jobs:
  test:
    name: pre-deploy gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  deploy:
    name: ssh-deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Accept-new pins the host key on first connection from this
          # ephemeral runner. Auth is enforced by the deploy key (only
          # principal in /home/intentsolutions/.ssh/authorized_keys for
          # this repo); the host key is signature-of-server, not auth.
          touch ~/.ssh/known_hosts && chmod 600 ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=accept-new intentsolutions@167.86.106.29 <<'REMOTE'
          set -euo pipefail
          cd /srv/lilly-75-holy
          git fetch --all --prune
          git reset --hard origin/main
          docker compose up -d --build
          docker image prune -f
          REMOTE

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS https://dixieroad.org/api/healthz | tee /tmp/h.json | jq -e '.ok == true' >/dev/null; then
              echo "::notice::healthz OK on attempt ${i}"
              exit 0
            fi
            echo "attempt ${i}: not yet, sleeping 5s"
            sleep 5
          done
          echo "::error::healthz did not return ok=true"
          cat /tmp/h.json || true
          exit 1
