name: OIDC Debug

# One-off debug workflow to print the GitHub OIDC JWT that would be sent
# to Tailscale, decoded. Manual dispatch only. Delete this file once the
# canonical deploy.yml is verified working.

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  inspect-jwt:
    runs-on: ubuntu-latest
    steps:
      - name: Print GH OIDC JWT (audience = same as TS_AUDIENCE)
        env:
          AUD: ${{ secrets.TS_AUDIENCE }}
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
        run: |
          set -euo pipefail
          # GH-injected OIDC env vars
          : "${ACTIONS_ID_TOKEN_REQUEST_URL:?missing}"
          : "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:?missing}"
          echo "audience-from-secret-length=${#AUD}"
          # Strip whitespace then URL-encode minimally
          AUD_TRIM=$(printf '%s' "$AUD" | tr -d '\r\n\t ')
          echo "audience-trim-length=${#AUD_TRIM}"
          echo "audience-trim-prefix=${AUD_TRIM:0:40}..."

          TOKEN=$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                       "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUD_TRIM}" \
                  | jq -r .value)

          # Decode JWT payload (middle segment)
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          # Pad base64
          while [ $(( ${#PAYLOAD} % 4 )) -ne 0 ]; do PAYLOAD="${PAYLOAD}="; done
          DECODED=$(echo "$PAYLOAD" | tr '_-' '/+' | base64 -d 2>/dev/null)

          # Print only safe claims (sub, aud, iss, repository, repository_id, etc.)
          echo "$DECODED" | jq '{
            iss: .iss,
            aud: .aud,
            sub: .sub,
            repository: .repository,
            repository_id: .repository_id,
            ref: .ref,
            workflow_ref: .workflow_ref,
            event_name: .event_name,
            actor: .actor,
            jti: .jti
          }'
